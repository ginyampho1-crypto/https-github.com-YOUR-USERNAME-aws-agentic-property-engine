AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Serverless AI Maintenance Agent infrastructure

Parameters:
  ProjectName:
    Type: String
    Description: Name of the project (used for resource naming)
    Default: agentic-prop

Resources:
  PropertyImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-property-images-${AWS::AccountId}"
