AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Serverless AI Maintenance Agent infrastructure

Resources:
  PropertyImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub property-images-ai-agent-${AWS::AccountId}-${AWS::Region}
      Tags:
        - Key: Project
          Value: Agentic-Prop
        - Key: Owner
          Value: Mpho
        - Key: Environment
          Value: Dev

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: agentic-prop-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub ${PropertyImagesBucket.Arn}/*
      Tags:
        - Key: Project
          Value: Agentic-Prop
        - Key: Owner
          Value: Mpho
        - Key: Environment
          Value: Dev

Outputs:
  BucketName:
    Description: Name of the S3 bucket for storing property images
    Value: !Ref PropertyImagesBucket

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt PropertyImagesBucket.Arn

  Region:
    Description: AWS region where the stack is deployed
    Value: !Ref AWS::Region

      
